name: monorepo-starter
agents:
  Codex:
    command: codex
    preset: codex
  Claude Code:
    command: claude
    preset: claude-code
  Cursor Agent:
    command: agent
    preset: cursor
  GitHub Copilot:
    command: copilot
    auto_start: true
    auto_restart: true
    preset: github-copilot
processes:
  sst:dev:
    command: bun run sst:dev
    auto_start: true
  build:web:
    command: bun run build
    working_dir: apps/app
  web:dev:
    command: bun run dev
    working_dir: apps/app
    auto_start: true
    auto_restart: true
